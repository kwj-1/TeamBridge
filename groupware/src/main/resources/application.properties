spring.application.name=groupware

# application.properties
# - DB 연결 정보, 서버 포트, Mybatis 경로 등을 이 파일 안에 설정

# 서버 포트 번호 설정
server.port=8810

# ------------------------------------
# 1. mysql DB연결
# ------------------------------------

# DB서버 주소(내 PC = localhost, 포트 3306, DB명 = groupware)
# useSSL=false          : SSL 보안 연결 사용 안 함 (로컬 개발 환경)
# serverTimezone        : 서버 시간대를 한국(Asia/Seoul)으로 지정
# characterEncoding     : 한글이 깨지지 않도록 UTF-8 인코딩 지정
spring.datasource.url=jdbc:mysql://localhost:3306/groupware?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# DB 접속 아이디
spring.datasource.username=root

# DB 접속 비밀번호
spring.datasource.password=1234

# MySQL JDBC 드라이버 연결
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ------------------------------------
# 2. MyBatis 설정
# ------------------------------------

# Mapper xml 파일 위치 : resources/mappers/ 폴더 안의 모든 xml
mybatis.mapper-locations=classpath:mappers/**/*.xml

# DB 컬럼명(member_id)을 자바 필드명(memberId)으로 자동 변환
mybatis.configuration.map-underscore-to-camel-case=true

# 세션 ID를 URL 에 붙이지 않고 쿠키로만 전달
# 이 설정이 없으면 로그인·회원가입 후 URL 뒤에 ;jsessionid=... 가 붙어서 이동됨
server.servlet.session.tracking-modes=cookie


# ------------------------------------
# 파일 업로드 경로 설정
# ------------------------------------
# 실제 파일이 저장될 서버 폴더 경로 (프로젝트 실행 위치 기준 상대경로 - 팀원마다 경로가 달라도 안 깨짐)
groupware.chat.upload-dir=uploads/chat
groupware.archive.upload-dir=uploads/archive
groupware.approval.upload-dir=uploads/approval
groupware.profileImg.upload-dir=uploads/profileImg

# ------------------------------------
# 파일 한 개의 최대 크기
spring.servlet.multipart.max-file-size = 10MB

# 요청 최대 크기
spring.servlet.multipart.max-request-size = 10MB

# ------------------------------------
# 메인 대시보드 날씨 위젯 (OpenWeatherMap API)
# ------------------------------------
# https://openweathermap.org 에서 무료 발급받은 키를 아래 값에 채워 넣으세요.
# DB 비밀번호와 같은 취급: 여기 채운 "진짜" 키는 커밋하지 않도록 주의(git status/diff로
# 확인 후 커밋). 비워두면 날씨 위젯은 그냥 "연동 실패"로만 표시되고 나머진 정상 동작함.
# WeatherController가 서버에서 대신 호출해서 브라우저에는 이 키가 절대 노출되지 않음.
weather.api.key=b4fbc047235966bcd6b6eef5ece76ddc
weather.api.city=Seoul
