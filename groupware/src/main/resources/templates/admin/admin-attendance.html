<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>직원 출결 관리 - 통합 사내 그룹웨어</title>
	<meta name="description" content="사내 그룹웨어 시스템 - 직원 출결 관리">

	<!-- 구글 폰트 및 폰트어썸 아이콘 -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<!-- ==========================================
	     핵심 애플리케이션 래퍼 (모든 화면 html이 공통으로 갖는 뼈대)
	     헤더/사이드바는 공통 조각(fragments/layout.html)을 th:replace로
	     가져다 쓴다 - mypage.html/admin.html과 동일한 패턴
	     ========================================== -->
	<div class="app-wrapper" id="appWrapper">

		<!-- 상단 헤더 -->
		<header th:replace="~{fragments/layout :: header}"></header>

		<!-- 메인 내비게이션 영역 -->
		<div class="main-body" id="mainBody">

			<!-- 좌측 사이드바 -->
			<aside th:replace="~{fragments/layout :: sidebar}"></aside>

			<!-- 중앙 동적 화면 콘텐츠 영역 -->
			<main class="view-content">

			<!-- ==========================================
	             화면: 관리자 - 직원 출결 관리 (role이 'admin'일 때만 노출)
	             attendance.html은 "내 기록"만 보여주지만, 이 화면은 관리자가
	             날짜를 골라 전 직원의 출퇴근을 직접 조회/수정할 수 있다.
	             ========================================== -->
				<div class="card">
					<div class="card-header">
						<h2>직원 출결 관리 (관리자 전용)</h2>
						<div style="display: flex; gap: 0.5rem;">
							<!-- 날짜 선택 + 이름 검색: 둘 다 바꾸는 즉시 표가 다시 그려진다 -->
							<form onsubmit="event.preventDefault();" style="display:flex; gap:0.5rem;">
								<input type="date" id="adminAttDate" class="form-control"
									style="width: 150px; font-size: 0.85rem;" onchange="renderAdminAttendance()">
								<input type="text" class="form-control" id="adminAttendanceSearch"
									placeholder="이름 검색..." onkeyup="searchAdminAttendance(this.value)"
									style="width: 200px; font-size: 0.85rem;">
							</form>
						</div>
					</div>

					<div class="table-container">
						<table class="table">
							<thead>
								<tr>
									<th>사번</th>
									<th>이름</th>
									<th>부서</th>
									<th>직급</th>
									<th style="width: 110px;">출근 시간</th>
									<th style="width: 110px;">퇴근 시간</th>
									<th style="width: 110px;" title="출근 시간 기준으로 자동 계산됩니다(09:00 초과 시 지각)">상태 (자동)</th>
									<th style="width: 80px; text-align: center;">저장</th>
								</tr>
							</thead>
							<tbody id="adminAttendanceTableBody">

							</tbody>
						</table>
					</div>
				</div>

			</main>
		</div>
	</div>

	<!-- 토스트 알림 컨테이너 -->
	<div id="toast-container" class="toast-container"></div>

	<script th:src="@{/js/common.js}"></script>
	<script th:src="@{/js/admin-attendance.js}"></script>
</body>

</html>
