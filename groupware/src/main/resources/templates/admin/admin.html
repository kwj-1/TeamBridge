<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 패널 - 통합 사내 그룹웨어</title>
  <meta name="description" content="사내 그룹웨어 시스템 - 관리자 패널">

  <!-- 구글 폰트 및 폰트어썸 아이콘 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==========================================
       핵심 애플리케이션 래퍼 (헤더/사이드바는 fragments/layout.html 조각을
       th:replace로 가져다 씀 - mypage.html과 동일한 패턴)
       ========================================== -->
  <div class="app-wrapper" id="appWrapper">

    <header th:replace="~{fragments/layout :: header}"></header>

    <div class="main-body" id="mainBody">

      <aside th:replace="~{fragments/layout :: sidebar}"></aside>

      <!-- 중앙 동적 화면 콘텐츠 영역 -->
      <main class="view-content">

        <!-- ==========================================
             화면: 관리자 포털 (SecurityConfig가 /admin/**을 ROLE_ADMIN만
             통과시키므로, 이 화면 자체는 관리자만 들어올 수 있음)
             표 데이터는 js/admin.js가 GET /admin/members로 채운다.
             ========================================== -->
        <div class="card">
          <div class="card-header">
            <h2>임직원 계정 및 인사 정보 관리 (관리자 전용)</h2>
            <div style="display: flex; gap: 0.5rem;">
              <!-- 실시간 검색창: 제출 없이 onkeyup으로 GET /admin/members?keyword= 재호출 -->
              <form onsubmit="event.preventDefault();" style="display:flex;">
                <input type="text" class="form-control" id="adminUserSearch" placeholder="이름 검색..." onkeyup="searchAdminUsers(this.value)" style="width: 220px; font-size: 0.85rem;">
              </form>
              <button class="btn btn-primary btn-sm" onclick="openCreateUserModal()"><i class="fa-solid fa-user-plus"></i> 신규 사원 등록</button>
            </div>
          </div>

          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>사번</th>
                  <th>이름</th>
                  <th>부서</th>
                  <th>직급</th>
                  <th>연락처</th>
                  <th>상태</th>
                  <th style="width: 280px; text-align: center;">작업</th>
                </tr>
              </thead>
              <!-- admin.js의 renderAdminTable()이 채움 -->
              <tbody id="adminUserTableBody"></tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- ==========================================
       동적 모달 (이 페이지에서 사용)
       ========================================== -->
  <div class="modal-overlay" id="modalOverlay">

    <!-- 관리자: 사용자 등록/수정 모달 - "신규 사원 등록" 버튼 또는 표의
         "수정" 버튼(openCreateUserModal/openEditUserModal)으로 열린다.
         부서/직급 select는 하드코딩 옵션 없이 비워두고, admin.js가 페이지
         로드 시 GET /admin/department, /admin/position으로 채운다. -->
    <div class="modal-content" id="modal-admin-user" style="display:none;">
      <div class="modal-header">
        <h3 id="adminModalTitle">신규 사원 등록</h3>
        <button class="icon-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form onsubmit="submitAdminUserForm(event)">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="adminUserName">사원 이름</label>
            <input type="text" id="adminUserName" class="form-control" required placeholder="예: 홍길동">
          </div>
          <div class="form-group">
            <label class="form-label" for="adminUserDept">소속 부서</label>
            <select id="adminUserDept" class="form-control" required></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="adminUserPos">인사 직급</label>
            <select id="adminUserPos" class="form-control" required></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="adminUserPhone">연락처</label>
            <input type="text" id="adminUserPhone" class="form-control" required placeholder="010-0000-0000">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">취소</button>
          <button type="submit" class="btn btn-primary" id="adminSubmitBtn">등록하기</button>
        </div>
      </form>
    </div>

  </div>

  <!-- 토스트 알림 컨테이너 -->
  <div id="toast-container" class="toast-container"></div>

  <script th:src="@{/js/common.js}"></script>
  <script th:src="@{/js/admin.js}"></script>
</body>
</html>
