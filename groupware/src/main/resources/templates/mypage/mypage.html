<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>마이페이지 - 통합 사내 그룹웨어</title>
	<meta name="description" content="사내 그룹웨어 시스템 - 마이페이지">

	<!-- 구글 폰트 및 폰트어썸 아이콘 -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<!-- ==========================================
       핵심 애플리케이션 래퍼 (모든 화면 html이 공통으로 갖는 뼈대)
       헤더/사이드바는 fragments/layout.html 조각을 th:replace로 가져다 씀
       ========================================== -->
	<div class="app-wrapper" id="appWrapper">

		<!-- 상단 헤더 - 공통 조각(fragments/layout.html) 재사용 -->
		<header th:replace="~{fragments/layout :: header}"></header>

		<!-- 메인 내비게이션 영역 -->
		<div class="main-body" id="mainBody">

			<!-- 좌측 사이드바 - 공통 조각(fragments/layout.html) 재사용 -->
			<aside th:replace="~{fragments/layout :: sidebar}"></aside>

			<!-- 중앙 동적 화면 콘텐츠 영역 -->
			<main class="view-content">

				<!-- ==========================================
             화면: 마이페이지 (로그인한 "본인"의 정보만 보고 수정한다)
             아래 값들은 서버가 th:text로 직접 렌더링(SSR) - Controller
             참고: MyPageController, GlobalModelAdvice
             ========================================== -->
				<div class="grid-12">

					<div class="col-4">
						<div class="card" style="text-align: center;">
							<img th:if="${employee.profileImg != null}" id="myAvatar"
								th:src="@{'/uploads/profileImg/' + ${employee.profileImg}}" class="profile-avatar-large"
								style="width: 100px; height: 100px; object-fit: cover; border-radius: 50%;">
							<div th:unless="${employee.profileImg != null}" id="myAvatar" class="profile-avatar-large"
								style="width: 100px; height: 100px; font-size: 2.5rem;"
								th:text="${#strings.substring(employee.employeeName, 0, 1)}">홍</div>
							<!-- 클릭하면 숨겨진 파일 선택창(myPhotoInput)이 열린다 -->
							<button type="button" class="btn btn-secondary btn-sm" style="margin-top: 0.75rem;"
								onclick="document.getElementById('myPhotoInput').click()">
								<i class="fa-solid fa-camera"></i> 프로필 사진 변경
							</button>
							<input type="file" id="myPhotoInput" accept="image/*" style="display:none;"
								onchange="handleProfilePhotoSelect(this)">
							<h2 id="myName" style="margin-top: 0.75rem;" th:text="${employee.employeeName}">홍길동</h2>
							<!-- 관리자는 부서/직급이 없어서(바로 위 이름이 이미 "관리자"라 중복 방지) 이 줄 자체를 숨김 -->
							<p style="color: var(--text-secondary); font-size: 0.85rem;" id="myDeptPosition"
								th:if="${employee.deptName != null}"
								th:text="|${employee.deptName} ${employee.positionName}|">개발팀 사원</p>
							<div style="margin-top: 1.5rem; text-align: left; font-size: 0.85rem;"
								class="commute-info-box">
								<div class="commute-row"><span>사번:</span><strong id="myId"
										th:text="${employee.employeeNo}">20260601</strong></div>
								<div class="commute-row" th:if="${employee.employeeRole != 'ADMIN'}">
									<span>입사일:</span><strong id="myJoin"
										th:text="${employee.hireDate}">2026-06-01</strong></div>
								<div class="commute-row"><span>권한 수준:</span><strong id="myRole"
										th:text="${employee.roleText}">일반 임직원</strong></div>
							</div>
						</div>
					</div>

					<div class="col-8">
						<div class="card">
							<h3
								style="margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom:1px solid var(--border-color);">
								개인 정보 수정</h3>

							<form onsubmit="saveMyInfo(event)">
								<div class="form-group">
									<label class="form-label" for="myPhone">연락처 (전화번호)</label>
									<input type="text" id="myPhone" class="form-control" required
										th:value="${employee.employeePhone}">
								</div>

								<div class="form-group">
									<label class="form-label" for="myEmail">이메일</label>
									<input type="email" id="myEmail" class="form-control" required
										th:value="${employee.employeeEmail}">
								</div>

								<div class="form-group">
									<label class="form-label" for="myBirthDate">생년월일</label>
									<input type="date" id="myBirthDate" class="form-control"
										th:value="${employee.birthDate}">
								</div>

								<button type="submit" class="btn btn-primary" style="margin-top: 1rem;">정보 저장</button>
							</form>

							<h3
								style="margin-top: 2rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom:1px solid var(--border-color);">
								비밀번호 변경</h3>
							<form onsubmit="changeMyPassword(event)">
								<div class="grid-2">
									<div class="form-group">
										<label class="form-label" for="currentPw">현재 비밀번호</label>
										<input type="password" id="currentPw" name="current-password"
											autocomplete="current-password" class="form-control" required
											placeholder="현재 비밀번호">
									</div>
									<div class="form-group">
										<label class="form-label" for="newPw">새 비밀번호</label>
										<input type="password" id="newPw" name="new-password"
											autocomplete="new-password" class="form-control" required
											placeholder="새 비밀번호">
									</div>
								</div>
								<button type="submit" class="btn btn-secondary">비밀번호 변경</button>
							</form>
						</div>
					</div>

				</div>

			</main>
		</div>
	</div>

	<!-- 토스트 알림 컨테이너 -->
	<div id="toast-container" class="toast-container"></div>

	<script th:src="@{/js/common.js}"></script>
	<script th:src="@{/js/mypage.js}"></script>
</body>

</html>
