<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>마이페이지 - 통합 사내 그룹웨어</title>
	<meta name="description" content="사내 그룹웨어 시스템 - 마이페이지">

	<!-- 구글 폰트 및 폰트어썸 아이콘 -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<!-- ==========================================
       핵심 애플리케이션 래퍼 (모든 화면 html이 공통으로 갖는 뼈대)
       헤더/사이드바는 fragments/layout.html 조각을 th:replace로 가져다 씀
       ========================================== -->
	<div class="app-wrapper" id="appWrapper">

		<!-- 상단 헤더 - 공통 조각(fragments/layout.html) 재사용 -->
		<header th:replace="~{fragments/layout :: header}"></header>

		<!-- 메인 내비게이션 영역 -->
		<div class="main-body" id="mainBody">

			<!-- 좌측 사이드바 - 공통 조각(fragments/layout.html) 재사용 -->
			<aside th:replace="~{fragments/layout :: sidebar}"></aside>

			<!-- 중앙 동적 화면 콘텐츠 영역 -->
			<main class="view-content">

				<!-- ==========================================
  <div class="app-wrapper" id="appWrapper">

     상단 헤더 -->
    <header class="header">
      <div class="header-left">
        <a href="main.html" class="logo" style="text-decoration:none;">
          <div class="logo-box"><i class="fa-solid fa-cubes"></i></div>
          <span style="margin-left: 0.5rem;">GROUPWARE</span>
        </a>
      </div>

      <div class="header-right">
        <button class="icon-btn" onclick="navigateTo('chat')" title="실시간 채팅">
          <i class="fa-solid fa-comment-dots"></i>
          <span class="badge" id="headerChatBadge">0</span>
        </button>
        <div class="user-dropdown" onclick="navigateTo('mypage')">
          <div class="user-avatar" id="headerAvatar">홍</div>
          <div class="user-details">
            <span class="user-name-text" id="headerName" th:text="${employee.employeeName}">홍길동</span>
            <span class="user-role-text" id="headerDept" th:text="${employee.deptName} + ' ' + ${employee.positionName}">개발팀 사원</span>
          </div>
        </div>
        <button class="icon-btn" onclick="doLogout()" title="로그아웃" style="color: var(--color-danger); border-color: rgba(248,113,113,0.2);">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </header>

    <!-- 메인 내비게이션 영역 -->
    <div class="main-body" id="mainBody">

      <!-- 좌측 사이드바 -->
      <aside class="sidebar">
        <ul class="sidebar-menu">
          <li class="sidebar-item" id="menu-dashboard"><a href="main.html"><i class="fa-solid fa-chart-line"></i> 대시보드</a></li>

          <li class="sidebar-group-label">업무</li>
          <li class="sidebar-item sub" id="menu-calendar"><a href="calendar.html"><i class="fa-solid fa-calendar-days"></i> 일정 캘린더</a></li>
          <li class="sidebar-item sub" id="menu-approval"><a href="approval.html"><i class="fa-solid fa-signature"></i> 전자결재</a></li>
          <li class="sidebar-item sub" id="menu-notice"><a href="notice.html"><i class="fa-solid fa-bullhorn"></i> 공지사항</a></li>
          <li class="sidebar-item sub" id="menu-archive"><a href="archive.html"><i class="fa-solid fa-file-shield"></i> 자료실</a></li>

          <li class="sidebar-group-label">조직 · 소통</li>
          <li class="sidebar-item sub" id="menu-org"><a href="org.html"><i class="fa-solid fa-sitemap"></i> 조직도</a></li>
          <li class="sidebar-item sub" id="menu-chat"><a href="chat.html"><i class="fa-solid fa-comment-dots"></i> 실시간 채팅</a></li>

          <li class="sidebar-group-label">근태관리</li>
          <li class="sidebar-item sub" id="menu-attendance"><a href="attendance.html"><i class="fa-solid fa-clock"></i> 출결 현황</a></li>

          <li class="sidebar-item" id="menu-mypage"><a href="mypage.html"><i class="fa-solid fa-user-gear"></i> 마이페이지</a></li>

          <!-- 관리자 전용 메뉴 - 기본 숨김, 로그인 사용자가 admin이면 JS가 보여준다 -->
          <li class="sidebar-group-label" id="adminGroupLabel" style="display: none;">관리자</li>
          <li class="sidebar-item sub" id="menu-admin" style="display: none;"><a href="admin.html"><i class="fa-solid fa-gears"></i> 계정·인사정보 관리</a></li>
          <li class="sidebar-item sub" id="menu-adminAttendance" style="display: none;"><a href="admin-attendance.html"><i class="fa-solid fa-user-clock"></i> 직원 출결 관리</a></li>
        </ul>
      </aside>

      <!-- 중앙 동적 화면 콘텐츠 영역 -->
      <main class="view-content">

        <!-- ==========================================
             화면: 마이페이지 (로그인한 "본인"의 정보만 보고 수정한다)
             아래 값들은 서버가 th:text로 직접 렌더링(SSR) - Controller
             참고: MyPageController, GlobalModelAdvice
             ========================================== -->
				<div class="grid-12">

					<div class="col-4">
						<div class="card" style="text-align: center;">
							<div class="profile-avatar-large" style="width: 100px; height: 100px; font-size: 2.5rem;"
								id="myAvatar">홍</div>
							<!-- 클릭하면 숨겨진 파일 선택창(myPhotoInput)이 열린다 -->
							<button type="button" class="btn btn-secondary btn-sm" style="margin-top: 0.75rem;"
								onclick="document.getElementById('myPhotoInput').click()">
								<i class="fa-solid fa-camera"></i> 프로필 사진 변경
							</button>
							<input type="file" id="myPhotoInput" accept="image/*" style="display:none;"
								onchange="handleProfilePhotoSelect(this)">
							<h2 id="myName" style="margin-top: 0.75rem;" th:text="${employee.employeeName}">홍길동</h2>
							<p style="color: var(--text-secondary); font-size: 0.85rem;" id="myDeptPosition"
								th:text="${employee.deptName} + ' ' + ${employee.positionName}">개발팀 사원</p>
							<div style="margin-top: 1.5rem; text-align: left; font-size: 0.85rem;"
								class="commute-info-box">
								<div class="commute-row"><span>사번:</span><strong id="myId"
										th:text="${employee.employeeNo}">20260601</strong></div>
								<div class="commute-row"><span>입사일:</span><strong id="myJoin"
										th:text="${employee.hireDate}">2026-06-01</strong></div>
								<div class="commute-row"><span>권한 수준:</span><strong id="myRole"
										th:text="${employee.roleText}">일반 임직원</strong></div>
							</div>
						</div>
					</div>

					<div class="col-8">
						<div class="card">
							<h3
								style="margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom:1px solid var(--border-color);">
								개인 정보 수정</h3>

							<form onsubmit="saveMyInfo(event)">
								<div class="form-group">
									<label class="form-label" for="myPhone">연락처 (전화번호)</label>
									<input type="text" id="myPhone" class="form-control" required
										th:value="${employee.employeePhone}">
								</div>

								<div class="form-group">
									<label class="form-label" for="myEmail">이메일</label>
									<input type="email" id="myEmail" class="form-control" required
										th:value="${employee.employeeEmail}">
								</div>

								<button type="submit" class="btn btn-primary" style="margin-top: 1rem;">정보 저장</button>
							</form>

							<h3
								style="margin-top: 2rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom:1px solid var(--border-color);">
								비밀번호 변경</h3>
							<form onsubmit="changeMyPassword(event)">
								<div class="grid-2">
									<div class="form-group">
										<label class="form-label" for="currentPw">현재 비밀번호</label>
										<input type="password" id="currentPw" name="current-password"
											autocomplete="current-password" class="form-control" required
											placeholder="현재 비밀번호">
									</div>
									<div class="form-group">
										<label class="form-label" for="newPw">새 비밀번호</label>
										<input type="password" id="newPw" name="new-password"
											autocomplete="new-password" class="form-control" required
											placeholder="새 비밀번호">
									</div>
								</div>
								<button type="submit" class="btn btn-secondary">비밀번호 변경</button>
							</form>
						</div>
					</div>

				</div>

			</main>
		</div>
	</div>

	<!-- 토스트 알림 컨테이너 -->
	<div id="toast-container" class="toast-container"></div>

	<script th:src="@{/js/common.js}"></script>
	<script th:src="@{/js/mypage.js}"></script>
</body>

</html>
