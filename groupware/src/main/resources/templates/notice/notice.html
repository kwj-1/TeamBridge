<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 - 통합 사내 그룹웨어</title>
  <meta name="description" content="사내 그룹웨어 시스템 - 공지사항">

  <!-- 구글 폰트 및 폰트어썸 아이콘 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

  <!-- ==========================================
       핵심 애플리케이션 래퍼 (모든 화면 html이 공통으로 갖는 뼈대)
       헤더/사이드바는 fragments/layout.html 조각을 th:replace로 가져다 씀
       ========================================== -->
  <div class="app-wrapper" id="appWrapper">

    <!-- 상단 헤더 - 공통 조각(fragments/layout.html) 재사용 -->
    <header th:replace="~{fragments/layout :: header}"></header>

    <!-- 메인 내비게이션 영역 -->
    <div class="main-body" id="mainBody">

      <!-- 좌측 사이드바 - 공통 조각(fragments/layout.html) 재사용 -->
      <aside th:replace="~{fragments/layout :: sidebar}"></aside>

      <!-- 중앙 동적 화면 콘텐츠 영역 -->
      <main class="view-content">

        <!-- ==========================================
             화면: 공지사항 (목록은 NoticeController가 조회한 값을
             th:each로 서버가 직접 렌더링(SSR) - 참고: NoticeController, NoticeService)
             검색/페이지 이동은 실시간 필터링이 아니라 GET 폼 제출로 페이지를 다시 요청한다.
             ========================================== -->
        <div class="card">
          <div class="card-header">
            <h2>공지사항 목록</h2>
            <div style="display: flex; gap: 0.5rem;">
              <!-- 검색창: 입력마다 필터링하지 않고, 제출(엔터) 시 GET /notice/list?keyword=...&page=1 로 재요청 -->
              <form th:action="@{/notice/list}" method="get" style="display:flex;">
                <input type="text" name="keyword" class="form-control" placeholder="제목/본문 검색..."
                       th:value="${keyword}" style="width: 220px; font-size: 0.85rem;">
              </form>
              <!-- 작성 권한: 관리자 + 팀장/부서장(POSITION_RANK 1~2). NoticeService.canManageNotice()가 단일 기준 -->
              <button type="button" class="btn btn-primary" onclick="openCreateNoticeModal()"
                      th:if="${@noticeService.canManageNotice(employee)}">
                <i class="fa-solid fa-pen"></i> 공지 작성
              </button>
            </div>
          </div>

          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th style="width: 80px;">번호</th>
                  <th>제목</th>
                  <th style="width: 180px;">작성자</th>
                  <th style="width: 120px;">등록일</th>
                  <th style="width: 100px;">조회수</th>
                </tr>
              </thead>
              <tbody>
                <tr class="clickable" th:each="n : ${notices}" th:onclick="'viewNotice(' + ${n.noticeId} + ')'">
                  <td>
                    <i class="fa-solid fa-thumbtack" style="color:var(--color-danger)" th:if="${n.pinned}"></i>
                    <span th:if="${n.pinned}">PIN</span>
                    <span th:unless="${n.pinned}" th:text="${n.noticeId}">1</span>
                  </td>
                  <td>
                    <div style="display:flex; align-items:center; gap:0.5rem;">
                      <span class="badge badge-danger" th:if="${n.pinned}">중요</span>
                      <strong th:text="${n.noticeTitle}">제목</strong>
                    </div>
                  </td>
                  <td th:text="${n.writerDeptName != null ? n.writerName + ' (' + n.writerDeptName + ')' : n.writerName}">작성자</td>
                  <td style="font-family:'Fira Code'; font-size:0.85rem;"
                      th:text="${n.createdAt != null ? #strings.substring(n.createdAt, 0, 10) : ''}">2026-06-30</td>
                  <td style="font-family:'Fira Code'; text-align:center;" th:text="${n.viewCount}">0</td>
                </tr>
                <tr th:if="${#lists.isEmpty(notices)}">
                  <td colspan="5" style="text-align:center; color:var(--text-muted); padding: 2rem 0;">등록된 공지가 없습니다.</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 페이지네이션: 현재 페이지 강조, 검색어(keyword)는 유지한 채 페이지만 이동 -->
          <div style="display:flex; justify-content:center; gap:0.4rem; margin-top:1rem;" th:if="${totalPages > 1}">
            <a th:each="p : ${#numbers.sequence(1, totalPages)}"
               th:href="@{/notice/list(keyword=${keyword}, page=${p})}"
               th:text="${p}"
               th:classappend="${p == currentPage} ? 'btn-primary' : 'btn-secondary'"
               class="btn btn-sm" style="min-width:2.2rem; text-align:center;">1</a>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- ==========================================
       동적 모달 (이 페이지에서 사용) - 평소엔 숨겨져 있다가
       openModal('모달id')가 호출될 때만 보인다 (openModal/closeModal: js/common.js).
       내용은 notice.js의 viewNotice()가 GET /notice/detail/{id} 결과로 채운다.
       ⚠️ 수정/삭제 버튼은 노출 조건만 걸어뒀고, 실제 동작은 다음 단계에서 구현
       ========================================== -->
  <div class="modal-overlay" id="modalOverlay">

    <div class="modal-content" id="modal-notice-detail" style="display:none;">
      <div class="modal-header">
        <h3 id="mNoticeTitle">공지 제목</h3>
        <button class="icon-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div style="font-size: 0.8rem; color: var(--text-muted); display:flex; justify-content:space-between; margin-bottom: 1rem;">
          <span>등록자: <strong id="mNoticeWriter" style="color:var(--text-secondary);">관리자</strong></span>
          <span>등록일: <strong id="mNoticeDate" style="color:var(--text-secondary);">2026-06-30</strong></span>
        </div>
        <div id="mNoticeContent" style="font-size: 0.95rem; white-space: pre-wrap; color: var(--text-secondary); line-height: 1.6;">
          공지 내용...
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="mNoticeDeleteBtn" style="display:none; margin-right:auto;" onclick="deleteNotice()">삭제</button>
        <button class="btn btn-secondary" id="mNoticeEditBtn" style="display:none;" onclick="openEditNoticeModal()">수정</button>
        <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
      </div>
    </div>

    <!-- 작성/수정 공용 모달 - "공지 작성" 버튼(신규) 또는 상세 모달의 "수정" 버튼(기존 글)으로 연다 -->
    <div class="modal-content" id="modal-notice-write" style="display:none;">
      <div class="modal-header">
        <h3 id="noticeWriteModalTitle">공지사항 신규 등록</h3>
        <button class="icon-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form onsubmit="submitNotice(event)">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="nWriteTitle">공지 제목</label>
            <input type="text" id="nWriteTitle" class="form-control" required placeholder="제목을 입력하세요">
          </div>
          <div class="form-group">
            <label class="form-label" for="nWriteContent">공지 본문 내용</label>
            <textarea id="nWriteContent" class="form-control" required placeholder="공지 본문 내용을 입력하세요"></textarea>
          </div>
          <div class="form-group">
            <label class="remember-me">
              <input type="checkbox" id="nWritePin"> 중요 공지 (목록 최상단 고정 및 PIN 고정 아이콘 표출)
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">취소</button>
          <button type="submit" class="btn btn-primary" id="nWriteSubmitBtn">등록하기</button>
        </div>
      </form>
    </div>

  </div>

  <!-- 토스트 알림 컨테이너 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 서버가 이미 계산한 권한 결과를 그대로 내려줌(클라이언트가 role을 다시 판단하지 않음).
       모달의 수정/삭제 버튼 노출에만 쓰고, 실제 처리는 어차피 서버가 다시 검증한다.
       삭제는 "본인 글 + 관리자는 예외" 기준이라 currentEmployeeId/isAdmin이 추가로 필요 -->
  <script th:inline="javascript">
    const canManageNotice = /*[[${@noticeService.canManageNotice(employee)}]]*/ false;
    const currentEmployeeId = /*[[${employee.employeeId}]]*/ 0;
    const isAdmin = /*[[${employee.employeeRole == 'ADMIN'}]]*/ false;
  </script>
  <script th:src="@{/js/common.js}"></script>
  <script th:src="@{/js/notice.js}"></script>
</body>
</html>
