<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공통 레이아웃 (헤더 · 사이드바) - 통합 사내 그룹웨어</title>
  <meta name="description" content="사내 그룹웨어 시스템 - 공통 레이아웃(헤더/사이드바) 미리보기">

  <!-- 구글 폰트 및 폰트어썸 아이콘 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==========================================
       공통 레이아웃 (헤더 + 사이드바) - 실제 Thymeleaf 조각(fragment)
       다른 화면은 th:replace="~{fragments/layout :: header}" /
       th:replace="~{fragments/layout :: sidebar}" 로 가져다 쓴다.
       employee는 GlobalModelAdvice가 모든 요청에 자동으로 채워주므로
       각 화면 Controller가 따로 담지 않아도 됨.
       ========================================== -->
  <div class="app-wrapper" id="appWrapper">

    <header class="header" th:fragment="header">
      <div class="header-left">
        <a th:href="@{/main}" class="logo" style="text-decoration:none;">
          <div class="logo-box"><i class="fa-solid fa-cubes"></i></div>
          <span style="margin-left: 0.5rem;">GROUPWARE</span>
        </a>
      </div>

      <div class="header-right">
        <a class="icon-btn" th:href="@{/chat}" title="실시간 채팅" style="text-decoration:none;">
          <i class="fa-solid fa-comment-dots"></i>
          <!-- 안읽음 수는 채팅 기능 만들 때 연동 - 지금은 0 고정 -->
          <span class="badge" id="headerChatBadge">0</span>
        </a>
        <a class="user-dropdown" th:href="@{/mypage}" style="text-decoration:none;">
          <!-- 아바타 이니셜 자동 추출은 나중에(지금은 고정 아이콘 성격) -->
          <div class="user-avatar" id="headerAvatar">홍</div>
          <div class="user-details">
            <span class="user-name-text" id="headerName" th:text="${employee.employeeName}">홍길동</span>
            <span class="user-role-text" id="headerDept"
                  th:text="${employee.deptName} + ' · ' + ${employee.positionName}">개발팀 · 사원</span>
          </div>
        </a>
        <a class="icon-btn" th:href="@{/logout}" title="로그아웃" style="color: var(--color-danger); border-color: rgba(248,113,113,0.2); text-decoration:none;">
          <i class="fa-solid fa-right-from-bracket"></i>
        </a>
      </div>
    </header>

    <div class="main-body" id="mainBody">

      <aside class="sidebar" th:fragment="sidebar">
        <ul class="sidebar-menu">
          <li class="sidebar-item" id="menu-dashboard"><a th:href="@{/main}"><i class="fa-solid fa-chart-line"></i> 대시보드</a></li>

          <li class="sidebar-group-label">업무</li>
          <li class="sidebar-item sub" id="menu-calendar"><a th:href="@{/calendar}"><i class="fa-solid fa-calendar-days"></i> 일정 캘린더</a></li>
          <li class="sidebar-item sub" id="menu-approval"><a th:href="@{/approval}"><i class="fa-solid fa-signature"></i> 전자결재</a></li>
          <li class="sidebar-item sub" id="menu-notice"><a th:href="@{/notice/list}"><i class="fa-solid fa-bullhorn"></i> 공지사항</a></li>
          <li class="sidebar-item sub" id="menu-archive"><a th:href="@{/archive/list}"><i class="fa-solid fa-file-shield"></i> 자료실</a></li>

          <li class="sidebar-group-label">조직 · 소통</li>
          <li class="sidebar-item sub" id="menu-org"><a th:href="@{/org}"><i class="fa-solid fa-sitemap"></i> 조직도</a></li>
          <li class="sidebar-item sub" id="menu-chat"><a th:href="@{/chat}"><i class="fa-solid fa-comment-dots"></i> 실시간 채팅</a></li>

          <li class="sidebar-group-label">근태관리</li>
          <li class="sidebar-item sub" id="menu-attendance"><a th:href="@{/attendance}"><i class="fa-solid fa-clock"></i> 출결 현황</a></li>

          <li class="sidebar-item" id="menu-mypage"><a th:href="@{/mypage}"><i class="fa-solid fa-user-gear"></i> 마이페이지</a></li>

          <!-- 관리자 전용 메뉴 - JS로 숨기는 대신 서버에서 employeeRole 판단해서
               아예 안 그림(th:block은 화면에 실제 태그로 안 남는 묶음 전용 태그) -->
          <th:block th:if="${employee.employeeRole == 'ADMIN'}">
            <li class="sidebar-group-label">관리자</li>
            <li class="sidebar-item sub"><a th:href="@{/admin}"><i class="fa-solid fa-gears"></i> 계정·인사정보 관리</a></li>
            <li class="sidebar-item sub"><a th:href="@{/admin/attendance}"><i class="fa-solid fa-user-clock"></i> 직원 출결 관리</a></li>
          </th:block>
        </ul>
      </aside>

      <main class="view-content">
        <!-- 각 페이지의 실제 콘텐츠가 들어가는 영역 (레이아웃 미리보기용 placeholder) -->
        <div class="card" style="display:flex; align-items:center; justify-content:center; min-height:300px; color:var(--text-muted);">
          이 영역에 각 페이지의 콘텐츠가 들어갑니다.
        </div>
      </main>

    </div>
  </div>

</body>
</html>
