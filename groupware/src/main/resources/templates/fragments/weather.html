<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>메인페이지 미니 날씨 위젯</title>
</head>

<th:block th:fragment="weatherWidget">
	<!-- 옆의 "이번 달 생일자"/미니 캘린더 카드와 똑같은 .card + 같은 padding/폰트 크기를 그대로
	     맞춰 씀 - 예전엔 이 위젯만 별도 <style>에 고정 너비(260px)·자체 색상값을 써서 다른
	     대시보드 카드들과 크기·여백·글씨체가 어긋나 보였음(2026-07-22 발견). -->
	<div class="card" style="padding: 1.25rem;">
		<div class="card-header" style="margin-bottom: 0.75rem; padding-bottom: 0.5rem;">
			<h4 class="card-title" style="font-size: 0.9rem;">
				<i class="fa-solid fa-cloud-sun" style="color: var(--color-accent);"></i>
				<span id="wLocation">서울</span>
			</h4>
		</div>

		<div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem;">
			<div style="font-size:2rem; line-height:1;" id="wIcon">☀️</div>
			<div>
				<div style="font-size:1.4rem; font-weight:700; color:var(--text-primary); line-height:1;">
					<span id="wTemp">--</span>°C
				</div>
				<div style="font-size:0.8rem; color:var(--text-secondary); margin-top:0.25rem;" id="wDesc">날씨 로딩 중...</div>
			</div>
		</div>

		<div style="display:flex; gap:0.75rem; border-top:1px solid var(--border-color); padding-top:0.5rem; font-size:0.75rem; color:var(--text-muted);">
			<span>💧 습도 <span id="wHumi">--</span>%</span>
			<span>💨 바람 <span id="wWind">--</span>m/s</span>
		</div>
	</div>

		<!-- [JavaScript] 실시간 데이터 요청 및 바인딩 스크립트 -->
		<script>
			document.addEventListener('DOMContentLoaded', function () {
				// 날씨 데이터 조회 - OpenWeatherMap을 브라우저가 직접 부르지 않고, 서버(/weather,
				// MainController)를 통해서만 부른다. API 키는 서버(application.properties)에만
				// 있고 브라우저로는 절대 안 나간다(2026-07-22).
				fetch('/weather')
					.then(response => {
						if (!response.ok) throw new Error('날씨 정보를 가져오지 못했습니다.');
						return response.json();
					})
					.then(data => {
						const temp = Math.round(data.main.temp);             // 기온 반올림
						const humidity = data.main.humidity;                 // 습도
						const windSpeed = data.wind.speed.toFixed(1);         // 풍속 소수점 한자리
						const desc = data.weather[0].description;            // 한국어 날씨 설명
						const condition = data.weather[0].main.toLowerCase(); // 기상 상태 분류명

						// 기상 상태 코드에 맞춰 이모지 변경 - 이모지 수정 가능
						let icon = '☀️';
						if (condition.includes('cloud')) icon = '☁️';
						else if (condition.includes('rain')) icon = '🌧️';
						else if (condition.includes('snow')) icon = '❄️';
						else if (condition.includes('thunder')) icon = '⚡';
						else if (condition.includes('drizzle')) icon = '🌦️';
						else if (condition.includes('mist') || condition.includes('fog')) icon = '🌫️';

						// 추출한 데이터를 HTML 엘리먼트에 순차 매핑
						document.getElementById('wTemp').innerText = temp;
						document.getElementById('wDesc').innerText = desc;
						document.getElementById('wHumi').innerText = humidity;
						document.getElementById('wWind').innerText = windSpeed;
						document.getElementById('wIcon').innerText = icon;
						document.getElementById('wLocation').innerText = '서울';
					})
					.catch(err => {
						console.error('날씨 데이터 연동 실패:', err);
						document.getElementById('wDesc').innerText = '연동 실패';
					});
			});
		</script>
</th:block>
</body>

</html>
