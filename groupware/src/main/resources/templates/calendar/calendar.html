<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>일정 캘린더 - 통합 사내 그룹웨어</title>
	<meta name="description" content="사내 그룹웨어 시스템 - 일정 캘린더">

	<!-- 구글 폰트 및 폰트어썸 아이콘 -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<link rel="stylesheet" href="css/style.css">
</head>

<body>
	<!-- ==========================================
	       핵심 애플리케이션 래퍼 (모든 화면 html이 공통으로 갖는 뼈대)

	       - #appWrapper: 안에 상단 헤더 + #mainBody가 들어간다.
	       - #mainBody: 안에 좌측 사이드바 + <main class="view-content">가 들어간다.
	       - <main class="view-content">: 페이지마다 실제로 다른 부분은
	         이 안쪽뿐이다. main.html은 대시보드, notice.html은 공지 목록...
	         이런 식으로 화면별 js 파일(dashboard.js 등)이 내용을 채운다.

	       아래 헤더/사이드바는 모든 화면 html에 똑같이 복사되어 있는 정적
	       마크업이다 (나중에 layout.html을 타임리프 조각으로 연결해 중복을
	       없앨 예정 - layout.html 참고). js/common.js의 initApplicationHeader()가
	       사용자 이름/아바타/안읽은 채팅 수, 관리자 메뉴 노출 여부, 현재 메뉴
	       강조(active) 표시 등 "동적으로 바뀌는 값"만 채워 넣는다.
	       ========================================== -->
	<div class="app-wrapper" id="appWrapper">

		<!-- 상단 헤더 - 공통 조각(fragments/layout.html) 재사용 -->
		<header th:replace="~{fragments/layout :: header}"></header>

		<!-- 메인 내비게이션 영역 -->
		<div class="main-body" id="mainBody">

			<!-- 좌측 사이드바 - 공통 조각(fragments/layout.html) 재사용 -->
			<aside th:replace="~{fragments/layout :: sidebar}"></aside>

			<!-- 중앙 동적 화면 콘텐츠 영역 -->
			<main class="view-content">

				<!-- ==========================================
             화면: 일정 캘린더
             ========================================== -->
				<div class="card">
					<div class="calendar-wrapper">
						<div class="calendar-controls">
							<div style="display: flex; align-items: center; gap: 1rem;">
								<h2>
									<span id="calendarYear">2026</span>년 <span id="calendarMonth">6</span>월
								</h2>
								<div style="display: flex; gap: 0.25rem;">
									<button class="btn btn-secondary btn-sm" id="calendarPrevBtn">
										<i class="fa-solid fa-chevron-left"></i>
									</button>
									<button class="btn btn-secondary btn-sm" id="calendarNextBtn">
										<i class="fa-solid fa-chevron-right"></i>
									</button>
								</div>
							</div>
							<button class="btn btn-primary" id="addScheduleBtn">
								<i class="fa-solid fa-plus"></i> 일정 추가
							</button>
						</div>

						<!-- 캘린더 그리드 - js/calendar.js의 renderCalendarGrid()가 그린다.
                 여러 날짜에 걸친 일정은 하루씩 끊지 않고, 같은 주(週) 안에서는
                 하나로 이어진 막대(.cal-event-bar)로, 주가 바뀌면 다음 줄에서
                 새 막대로 이어서 그린다. -->
						<div class="cal-month" id="fullCalendarGrid"></div>
					</div>
				</div>
			</main>
		</div>
	</div>

	<!-- ==========================================
       동적 모달 (이 페이지에서 사용)
       ========================================== -->
	<div class="modal-overlay" id="modalOverlay">

		<!-- 캘린더 일정 등록 모달 - "일정 추가" 버튼이나 빈 날짜 칸 클릭
         (openScheduleModal/openEditScheduleModal)으로 열린다 -->
		<div class="modal-content" id="modal-calendar-write" style="display:none;">
			<div class="modal-header">
				<h3 id="calendarModalTitle">새 일정 등록</h3>
				<button class="icon-btn" id="scheduleModalCloseBtn"><i class="fa-solid fa-xmark"></i></button>
			</div>
			<!-- th:data-* 3개는 calendar.js가 삭제 버튼 노출 여부를 CalendarService.canModifyEvent()와
			     동일한 기준으로 판단하기 위해 로그인 사용자 정보를 그대로 내려주는 용도(GlobalModelAdvice의 employee) -->
			<form id="scheduleForm" th:data-employee-id="${employee.employeeId}"
				th:data-employee-role="${employee.employeeRole}" th:data-dept-id="${employee.deptId}">
				<div class="modal-body">
					<div class="grid-2">
						<div class="form-group">
							<label class="form-label" for="scheduleStartDate">시작일</label>
							<input type="date" id="scheduleStartDate" name="startDate" class="form-control" required>
						</div>
						<div class="form-group">
							<label class="form-label" for="scheduleEndDate">종료일</label>
							<input type="date" id="scheduleEndDate" name="endDate" class="form-control" required>
						</div>
					</div>
					<div class="form-group">
						<label class="form-label" for="scheduleTitle">일정 제목</label>
						<input type="text" id="scheduleTitle" name="eventTitle" class="form-control" required placeholder="회의 또는 업무 내용 입력">
					</div>
					<div class="form-group">
						<label class="form-label" for="scheduleType">일정 구분</label>
						<!-- TEAM/COMPANY 옵션을 th:if로 아예 안 만들면, 그 값을 못 고르는 사람이
						     "열람만" 하는 상황(예: 일반 직원이 COMPANY 일정을 클릭해서 봄)에서
						     scheduleType.value = 'COMPANY'로 지정해도 그 옵션 자체가 DOM에 없어서
						     드롭다운이 엉뚱한 값(첫번째 옵션인 개인 일정)을 보여주는 문제가 생긴다.
						     그래서 옵션은 항상 3개 다 만들어두고, "새로 등록할 때 고를 수 없게"만
						     disabled로 막는다(등록/수정 가능 여부의 최종 차단은 서버가 함) -->
						<select id="scheduleType" name="eventCategory" class="form-control">
							<option value="PERSONAL">개인 일정 (본인 캘린더만 노출)</option>
							<!-- 관리자는 소속 부서가 없어 팀 일정을 만들 수 없으므로 선택 불가 처리 -->
							<option value="TEAM" th:disabled="${employee.employeeRole == 'ADMIN'}">팀 일정 (소속 부서원 연동)</option>
							<!-- 회사 일정은 관리자만 등록 가능하므로 관리자가 아니면 선택 불가 처리 -->
							<option value="COMPANY" th:disabled="${employee.employeeRole != 'ADMIN'}">회사 일정 (전사 노출)</option>
						</select>
					</div>
				</div>
				<div class="modal-footer">
					<!-- 신규 등록 모드에서는 숨겨져 있다가, 일정 막대를 클릭해 수정
             모드로 열었을 때만 openEditScheduleModal()이 보여준다 -->
					<button type="button" class="btn btn-danger" id="cEventDeleteBtn"
						style="display:none; margin-right:auto;">삭제</button>
					<button type="button" class="btn btn-secondary" id="scheduleCancelBtn">취소</button>
					<button type="submit" class="btn btn-primary" id="cEventSubmitBtn">등록</button>
				</div>
			</form>
		</div>

	</div>

	<!-- 토스트 알림 컨테이너 -->
	<div id="toast-container" class="toast-container"></div>

	<script src="js/common.js"></script>
	<script src="js/calendar.js"></script>
</body>

</html>
