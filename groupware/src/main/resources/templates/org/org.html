<!DOCTYPE html>
<html lang="ko" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조직도 - 통합 사내 그룹웨어</title>
  <meta name="description" content="사내 그룹웨어 시스템 - 조직도">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}" href="css/style.css">
</head>
<body>

	
	
	
  <div class="app-wrapper" id="appWrapper">
    <!-- 상단 헤더는 공통 조각이 담당한다. employee 값은 GlobalModelAdvice가 자동으로 제공한다. -->
    <header th:replace="~{fragments/layout :: header}"></header>

    <div class="main-body" id="mainBody">
      <!-- 좌측 사이드바도 공통 조각이 담당한다. 관리자 메뉴는 조각 내부에서 employeeRole로 판단한다. -->
      <aside th:replace="~{fragments/layout :: sidebar}"></aside>

      <main class="view-content">
        <div class="org-container">
          <div class="org-tree">
            <h3 style="font-size: 1rem; margin-bottom: 1rem;">사내 조직 현황</h3>
            <ul style="list-style:none;">
              <!-- 전체보기를 누르면 deptId 없이 /org로 이동한다. selectedDeptId가 null일 때만 원본 active 스타일을 붙인다. -->
              <li>
                <a class="org-node" id="org-all" th:classappend="${selectedDeptId == null ? ' active' : ''}" th:href="@{/org}">
                  <i class="fa-solid fa-building"></i> 주식회사 코퍼레이션
                </a>
              </li>
              <!--
                th:each는 OrgController가 model에 담은 departments 목록을 한 부서씩 반복한다.
                따라서 DB의 DEPARTMENT 테이블에 있는 부서 수만큼 원본 li/a 모양이 만들어진다.
              -->
              <li th:each="department : ${departments}" style="margin-left: 0.75rem;">
                <!--
                  th:id: 부서마다 다른 HTML ID를 만든다.
                  th:classappend: 현재 URL의 deptId와 이 부서 ID가 같을 때만 active 클래스를 추가한다.
                  th:href: 부서를 누르면 /org?deptId=부서번호로 다시 요청해 해당 부서 직원만 조회한다.
                -->
                <a class="org-node" th:id="|org-${department.deptId}|"
                   th:classappend="${selectedDeptId == department.deptId ? ' active' : ''}"
                   th:href="@{/org(deptId=${department.deptId})}">
                  <!-- th:switch/th:case는 DB 부서명에 맞는 Font Awesome 아이콘 하나만 출력하기 위한 분기다. -->
                  <th:block th:switch="${department.deptName}">
                    <i th:case="'인사팀'" class="fa-solid fa-users"></i>
                    <i th:case="'기획팀'" class="fa-solid fa-compass"></i>
                    <i th:case="'개발팀'" class="fa-solid fa-code"></i>
                    <i th:case="'디자인팀'" class="fa-solid fa-palette"></i>
                    <i th:case="'총무팀'" class="fa-solid fa-briefcase"></i>
                    <i th:case="'영업팀'" class="fa-solid fa-chart-line"></i>
                    <i th:case="*" class="fa-solid fa-users"></i>
                  </th:block>
                  <!-- th:text가 department의 실제 DEPT_NAME으로 기본 글자 '부서'를 교체한다. -->
                  <span th:text="${department.deptName}">부서</span>
                </a>
              </li>
            </ul>
          </div>

          <div class="org-members">
            <!-- th:text는 전체/선택 부서 여부에 따라 표 제목을 서버에서 완성한다. -->
            <h3 style="margin-bottom: 1rem;" id="orgTitle"
                th:text="${selectedDeptName == null ? '임직원 목록 (전체)' : '임직원 목록 (' + selectedDeptName + ')'}">임직원 목록 (전체)</h3>
            <div class="table-container">
              <table class="table">
                <thead>
                  <tr>
                    <th>사진</th>
                    <th>이름</th>
                    <th>부서</th>
                    <th>직급</th>
                    <th>상태</th>
                  </tr>
                </thead>
                <!--
                  th:attr은 JS가 현재 로그인한 사람을 알아야 자기 자신에게 채팅 버튼을 숨길 수 있어 넣었다.
                  currentEmployeeId는 OrgController가 Security 로그인 정보에서 model로 전달한다.
                -->
                <tbody id="orgMemberTableBody" th:attr="data-current-employee-id=${currentEmployeeId}">
                  <!-- th:each는 조회된 ACTIVE 직원 목록을 원본 표의 한 행 모양으로 반복 출력한다. -->
                  <tr class="clickable" th:each="employee : ${employees}"
                      th:onclick="|viewOrgMemberDetail(${employee.employeeId})|">
                    <!-- 사진이 있으면 저장된 프로필을, 없으면 이름 첫 글자를 표시한다. -->
                    <td>
                      <img class="user-avatar profile-image"
                           th:if="${!#strings.isEmpty(employee.profileImg)}"
                           th:src="@{'/uploads/profileImg/' + ${employee.profileImg}}"
                           style="width:24px; height:24px; font-size:0.7rem; object-fit:cover;"
                           alt="프로필 사진">
                      <div class="user-avatar"
                           th:if="${#strings.isEmpty(employee.profileImg)}"
                           style="width:24px; height:24px; font-size:0.7rem;"
                           th:text="${#strings.substring(employee.employeeName, 0, 1)}">홍</div>
                    </td>
                    <!-- 아래 th:text들은 EmployeeMapper 조회 결과로 원본의 가짜 텍스트를 교체한다. -->
                    <td><strong th:text="${employee.employeeName}">홍길동</strong></td>
                    <td th:text="${employee.deptName ?: '관리자'}">개발팀</td>
                    <td><span class="badge badge-primary" th:text="${employee.positionName ?: employee.employeeRole}">사원</span></td>
                    <!--
                      직원이 조직도에 보이는지는 SQL의 EMPLOYEE_STATUS='ACTIVE'가 결정한다.
                      아래 값은 재직 여부가 아니라 오늘 ATTENDANCE 기록으로 계산한 근태 상태다.
                    -->
                    <td>
                      <!--
                        employee는 th:each가 employees 목록에서 한 명씩 꺼낸 EmployeeDTO다.
                        th:if는 ${...} 안의 조건이 true일 때만 현재 span 태그를 HTML에 출력하는 Thymeleaf 문법이다.
                        ==는 두 값이 같은지 비교한다. EMPLOYEE_ROLE이 ADMIN인 관리자만 아래 "-"를 보게 된다.
                      -->
                      <span th:if="${employee.employeeRole == 'ADMIN'}">-</span>

                      <!--
                        th:unless는 th:if의 반대다. 조건이 false일 때만 이 블록을 출력한다.
                        즉 관리자는 위의 "-"만 출력하고, ADMIN이 아닌 일반 직원만 아래 근태 상태 분기로 들어간다.
                        th:block은 화면에 실제 HTML 태그를 남기지 않고 Thymeleaf 조건·반복을 묶을 때 사용하는 전용 태그다.
                        th:switch는 employee.workStatus 값에 따라 여러 th:case 중 하나를 선택하는 조건 분기 문법이다.
                      -->
                      <th:block th:unless="${employee.employeeRole == 'ADMIN'}"
                                th:switch="${employee.workStatus}">
                        <!-- WORKING이면 오늘 출근 후 아직 퇴근하지 않은 상태로, 초록 badge CSS 클래스를 적용한다. -->
                        <span th:case="'WORKING'" class="badge badge-success">출근 (근무중)</span>
                        <!-- LEAVE이면 휴가 상태를 표시한다. -->
                        <span th:case="'LEAVE'" class="badge badge-primary">휴가</span>
                        <!-- DONE이면 오늘 퇴근 처리가 끝난 상태를 표시한다. -->
                        <span th:case="'DONE'" class="badge badge-muted">퇴근</span>
                        <!-- th:case="*"는 위 어느 상태에도 맞지 않을 때 실행되는 기본값(default)이다. -->
                        <span th:case="*" class="badge badge-warning">미출근</span>
                      </th:block>
                    </td>
                  </tr>
                  <!-- th:if는 해당 부서에 재직 직원이 없을 때만 안내 행을 보여준다. -->
                  <tr th:if="${#lists.isEmpty(employees)}">
                    <td colspan="5" style="text-align:center; padding:2rem; color:var(--text-muted);">표시할 재직 직원이 없습니다.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modal-org-member" style="display:none;">
      <div class="modal-header">
        <h3 id="mOrgName">임직원 정보</h3>
        <button class="icon-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div style="text-align:center; margin-bottom:1rem;">
          <div class="profile-avatar-large" style="width:90px; height:90px; font-size:2rem;" id="mOrgAvatar">홍</div>
          <div id="mOrgDept" style="color:var(--text-secondary); font-size:0.9rem;">개발팀 · 사번 20260601</div>
        </div>
        <div style="background-color:var(--bg-tertiary); padding:1rem; border-radius:8px; border:1px solid var(--border-color); font-size:0.85rem;">
          <div style="margin-bottom:0.35rem;">연락처: <strong id="mOrgPhone">-</strong></div>
          <div style="margin-bottom:0.35rem;">이메일: <strong id="mOrgEmail">-</strong></div>
          <div>상태: <strong id="mOrgStatus">-</strong></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="mOrgChatBtn"><i class="fa-solid fa-comment-dots"></i> 채팅하기</button>
        <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <!-- 공통 헤더·사이드바의 안 읽은 채팅 배지와 모달 유틸리티를 먼저 불러온다. -->
  <script th:src="@{/js/common.js}" src="/js/common.js"></script>
  <!-- th:src는 Spring Boot 정적 리소스 경로에서 org.js를 불러와 직원 상세 모달과 헤더를 동작시킨다. -->
  <script th:src="@{/js/org.js}" src="js/org.js"></script>
</body>
</html>
